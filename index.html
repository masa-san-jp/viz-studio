<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viz Studio — データに、雰囲気を与える</title>
<style>
  :root{--bg:#05060c;--panel:#0d1120ea;--ink:#edeaf6;--muted:#8f8ca6;--gold:#ffd08a;--line:#242a44;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;}
  canvas{display:block;position:fixed;inset:0;z-index:0;}
  #panel{position:fixed;top:16px;left:16px;z-index:10;width:300px;max-height:calc(100vh - 32px);overflow:auto;
    background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;
    padding:16px 16px 18px;box-shadow:0 10px 50px #000b;}
  h1{font-size:14px;margin:0;letter-spacing:.04em;font-weight:700;}
  .sub{font-size:10.5px;color:var(--muted);margin:3px 0 14px;line-height:1.5;}
  .mood{margin:15px 0;}
  .mood .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .mood .lab b{font-weight:600;color:var(--ink);}
  .mood .ends{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:2px;letter-spacing:.02em;}
  input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:3px;
    background:linear-gradient(90deg,#2a3050,#5b4a86);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--gold);border:2px solid #1a1408;cursor:pointer;box-shadow:0 0 10px #ffd08a66;}
  .seg{display:flex;gap:6px;margin:6px 0 4px;}
  .seg button{flex:1;cursor:pointer;background:#161b30;color:var(--ink);border:1px solid var(--line);
    border-radius:9px;padding:7px;font-size:12px;}
  .seg button.on{background:var(--gold);color:#1a1408;border:none;font-weight:700;}
  details{margin-top:14px;border-top:1px solid var(--line);padding-top:10px;}
  details summary{cursor:pointer;font-size:11px;color:var(--muted);}
  textarea{width:100%;box-sizing:border-box;height:84px;margin-top:8px;background:#0a0d18;color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px;font-family:ui-monospace,monospace;font-size:11px;}
  .mini{font-size:10px;color:var(--muted);margin:8px 0 3px;}
  select{width:100%;box-sizing:border-box;background:#0a0d18;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:5px;font-size:11px;}
  .row{display:flex;gap:8px;}.row>div{flex:1;}
  .btns{display:flex;gap:8px;margin-top:9px;}
  .btns button{flex:1;cursor:pointer;border-radius:8px;padding:7px;font-size:12px;border:1px solid var(--line);background:#161b30;color:var(--ink);}
  .btns button.primary{background:var(--gold);color:#1a1408;border:none;font-weight:700;}
  #err{color:#ff9d8a;font-size:11px;margin-top:6px;}
  #hint{position:fixed;right:16px;bottom:14px;z-index:5;color:var(--muted);font-size:11px;}
</style>
</head>
<body>

<div id="panel">
  <h1>Viz Studio</h1>
  <div class="sub">データに、雰囲気を与える。気分のつまみを動かすと、全体の空気がまとめて変わります。</div>
  <div class="seg" id="mode"><button data-m="points" class="on">粒</button><button data-m="bars">柱</button></div>

  <div class="mood"><div class="lab"><b>温度</b><span id="t_warm"></span></div>
    <input type="range" id="warm" min="0" max="1" step="0.01" value="0.72">
    <div class="ends"><span>寒色・静謐</span><span>暖色・熱</span></div></div>

  <div class="mood"><div class="lab"><b>ドラマ</b></div>
    <input type="range" id="drama" min="0" max="1" step="0.01" value="0.5">
    <div class="ends"><span>穏やか・平坦</span><span>劇的・そそり立つ</span></div></div>

  <div class="mood"><div class="lab"><b>エネルギー</b></div>
    <input type="range" id="energy" min="0" max="1" step="0.01" value="0.35">
    <div class="ends"><span>静寂</span><span>躍動・鼓動</span></div></div>

  <div class="mood"><div class="lab"><b>空気感</b></div>
    <input type="range" id="air" min="0" max="1" step="0.01" value="0.3">
    <div class="ends"><span>澄んだ夜</span><span>霧・幻想</span></div></div>

  <div class="mood"><div class="lab"><b>密度感</b></div>
    <input type="range" id="dens" min="0" max="1" step="0.01" value="0.5">
    <div class="ends"><span>繊細・ひとつぶ</span><span>濃密・光の塊</span></div></div>

  <details id="dbox"><summary>データと列（開いて差し替え）</summary>
    <textarea id="data" spellcheck="false" placeholder="CSV か JSON配列（1行目=見出し）"></textarea>
    <div class="btns"><button id="sample">サンプル</button><button id="apply" class="primary">反映</button></div>
    <div id="err"></div>
    <div class="row"><div><div class="mini">X 列</div><select id="cx"></select></div><div><div class="mini">高さ 列</div><select id="cy"></select></div></div>
    <div class="row"><div><div class="mini">奥行き Z</div><select id="cz"></select></div><div><div class="mini">色 列</div><select id="cc"></select></div></div>
  </details>
</div>
<div id="hint">ドラッグ=回転 / ホイール=拡大</div>
<script src="three.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let ROWS=[],COLS=[],MODE="points";
// warm & cool palette poles; 温度 interpolates between them
const COOL=[[16,22,54],[26,74,150],[40,150,190],[120,205,215],[224,244,255]];
const WARM=[[38,24,66],[120,40,104],[214,72,46],[255,158,61],[255,232,178]];
function mixStop(a,b,k){return [a[0]+(b[0]-a[0])*k,a[1]+(b[1]-a[1])*k,a[2]+(b[2]-a[2])*k];}
function ramp(warm,t){ // warm:0..1 palette temp, t:0..1 value
  const P=COOL.map((c,i)=>mixStop(c,WARM[i],warm));
  t=Math.max(0,Math.min(1,t));const f=t*(P.length-1);const i=Math.floor(f),g=f-i;
  return mixStop(P[i],P[Math.min(i+1,P.length-1)],g);
}
// data
function parse(txt){txt=txt.trim();if(!txt)throw"データが空です";
  if(txt[0]==="["||txt[0]==="{"){let j=JSON.parse(txt);if(!Array.isArray(j))j=[j];if(!j.length)throw"空配列";
    if(Array.isArray(j[0])){const cols=j[0].map((_,i)=>"c"+i);return{cols,rows:j.map(r=>{const o={};cols.forEach((c,i)=>o[c]=r[i]);return o;})};}
    return{cols:Object.keys(j[0]),rows:j};}
  const L=txt.split(/\r?\n/).filter(l=>l.trim());const cols=L[0].split(",").map(s=>s.trim());
  const rows=L.slice(1).map(l=>{const p=l.split(",");const o={};cols.forEach((c,i)=>o[c]=(p[i]??"").trim());return o;});return{cols,rows};}
const num=v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
function fillSelects(){for(const id of["cx","cy","cz","cc"]){const s=$(id);s.innerHTML="";
  const n=document.createElement("option");n.value="";n.textContent="（なし）";s.appendChild(n);
  COLS.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;s.appendChild(o);});}
  const nu=COLS.filter(c=>ROWS.some(r=>num(r[c])!==null));
  $("cx").value=nu[0]||"";$("cy").value=nu[1]||nu[0]||"";$("cz").value=nu[2]||"";$("cc").value=nu[1]||COLS[COLS.length-1]||"";}
function axisNorm(col){const vs=ROWS.map(r=>num(r[col])).filter(v=>v!==null);if(!vs.length)return{get:()=>0.5};
  const mn=Math.min(...vs),mx=Math.max(...vs);return{get:r=>{const v=num(r[col]);return v===null?0:(mx===mn?0.5:(v-mn)/(mx-mn));}};}
function colorT(col){const vs=ROWS.map(r=>num(r[col]));
  if(vs.every(v=>v===null)){const cats=[...new Set(ROWS.map(r=>r[col]))];return r=>cats.length<2?0.6:cats.indexOf(r[col])/(cats.length-1);}
  const f=vs.filter(v=>v!==null),mn=Math.min(...f),mx=Math.max(...f);return r=>{const v=num(r[col]);return v===null?0.5:(mx===mn?0.5:(v-mn)/(mx-mn));};}

// three
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();let BG=0x05060c;renderer.setClearColor(BG,1);scene.fog=new THREE.Fog(BG,300,650);
const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,4000);
const group=new THREE.Group();scene.add(group);
let grid=new THREE.GridHelper(400,28,0x1b2440,0x0d1428);grid.position.y=-0.1;scene.add(grid);
scene.add(new THREE.AmbientLight(0x8494c4,0.65));const pl=new THREE.PointLight(0xfff0d6,0.8);pl.position.set(120,220,120);scene.add(pl);
function dot(){const c=document.createElement('canvas');c.width=c.height=64;const g=c.getContext('2d');const r=g.createRadialGradient(32,32,0,32,32,32);r.addColorStop(0,'rgba(255,255,255,1)');r.addColorStop(.32,'rgba(255,246,224,.82)');r.addColorStop(1,'rgba(255,226,182,0)');g.fillStyle=r;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const DOT=dot();
let built=null,ptMat=null;
function clearBuilt(){if(built){group.remove(built);built.traverse&&built.traverse(o=>{o.geometry&&o.geometry.dispose();o.material&&o.material.dispose();});if(built.geometry)built.geometry.dispose();}built=null;ptMat=null;}
const M=()=>({warm:+$("warm").value,drama:+$("drama").value,energy:+$("energy").value,air:+$("air").value,dens:+$("dens").value});
function build(){clearBuilt();if(!ROWS.length)return;const m=M();
  const cx=$("cx").value,cy=$("cy").value,cz=$("cz").value,cc=$("cc").value;
  const nx=axisNorm(cx),ny=axisNorm(cy),nz=axisNorm(cz),ct=colorT(cc);
  const SPAN=200,H=50+m.drama*170;                       // ドラマ→高さ
  const contrast=0.5+m.drama*0.9;                        // ドラマ→色の押し出し
  const cT=r=>{let t=ct(r);return Math.pow(t,1/contrast);};
  if(MODE==="points"){const pos=[],col=[];
    ROWS.forEach(r=>{const x=(nx.get(r)-0.5)*SPAN,z=cz?(nz.get(r)-0.5)*SPAN:0,y=ny.get(r)*H;
      pos.push(x,y,z);const c=ramp(m.warm,cT(r));const b=0.55+m.drama*0.6;col.push(c[0]/255*b,c[1]/255*b,c[2]/255*b);});
    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
    ptMat=new THREE.PointsMaterial({size:2+m.dens*9,map:DOT,vertexColors:true,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true,opacity:0.6+m.dens*0.4});
    built=new THREE.Points(g,ptMat);group.add(built);
  }else{const gp=new THREE.Group();
    ROWS.forEach(r=>{const x=(nx.get(r)-0.5)*SPAN,z=cz?(nz.get(r)-0.5)*SPAN:0,h=Math.max(0.6,ny.get(r)*H);
      const bw=2+m.dens*6;const box=new THREE.BoxGeometry(bw,h,bw);box.translate(x,h/2,z);
      const c=ramp(m.warm,cT(r));const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(c[0]/255*0.35,c[1]/255*0.35,c[2]/255*0.35),emissive:new THREE.Color(c[0]/255,c[1]/255,c[2]/255),emissiveIntensity:0.4+m.drama*0.9,roughness:0.5});
      gp.add(new THREE.Mesh(box,mat));});
    built=gp;group.add(built);}
  applyAir(m);
}
function applyAir(m){ // 空気感→fog & bg tone
  const near=420-m.air*360, far=760-m.air*300; scene.fog.near=near;scene.fog.far=far;
  const tint=[[5,6,12],[14,12,26]]; const k=m.air; const bg=[Math.round(5+9*k),Math.round(6+6*k),Math.round(12+14*k)];
  BG=(bg[0]<<16)|(bg[1]<<8)|bg[2];renderer.setClearColor(BG,1);scene.fog.color.setHex(BG);
}
// orbit
let az=0.6,pol=1.0,rad=250,ty=24,drag=false,px=0,py=0,last=0;
function place(){camera.position.set(rad*Math.sin(pol)*Math.sin(az),ty+rad*Math.cos(pol),rad*Math.sin(pol)*Math.cos(az));camera.lookAt(0,ty,0);}
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;last=performance.now();el.setPointerCapture(e.pointerId);});
el.addEventListener('pointerup',()=>drag=false);
el.addEventListener('pointermove',e=>{if(!drag)return;az-=(e.clientX-px)*0.005;pol=Math.max(0.15,Math.min(1.5,pol-(e.clientY-py)*0.004));px=e.clientX;py=e.clientY;last=performance.now();});
el.addEventListener('wheel',e=>{e.preventDefault();rad=Math.max(80,Math.min(900,rad+e.deltaY*0.5));last=performance.now();},{passive:false});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
function tick(t){requestAnimationFrame(tick);const e=+$("energy").value;
  if(!drag&&performance.now()-last>2200&&!reduce)az+=0.0009+e*0.006;               // エネルギー→回転
  if(ptMat){const base=2+(+$("dens").value)*9;ptMat.size=base*(1+0.18*e*Math.sin(t*0.004));} // →鼓動
  place();renderer.render(scene,camera);}
requestAnimationFrame(tick);
// UI
function applyData(){try{$("err").textContent="";const {cols,rows}=parse($("data").value);COLS=cols;ROWS=rows;fillSelects();build();}catch(e){$("err").textContent="読み込めません："+e;}}
$("apply").onclick=applyData;
$("sample").onclick=()=>{$("data").value="region,population,area,age\nChiyoda,66670,12,48\nShinjuku,361787,18,44\nSetagaya,959397,58,45\nToshima,307015,13,43\nMinato,273125,20,46\nEdogawa,709372,50,45\nNerima,764094,48,46\nOta,762357,60,47\nItabashi,598863,32,45\nKoto,554093,42,44";applyData();};
["cx","cy","cz","cc"].forEach(id=>$(id).onchange=build);
["warm","drama","dens"].forEach(id=>$(id).oninput=build);
$("air").oninput=()=>applyAir(M());
$("warm").oninput=()=>{$("t_warm").textContent="";build();};
document.querySelectorAll("#mode button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#mode button").forEach(x=>x.classList.remove("on"));b.classList.add("on");MODE=b.dataset.m;build();});
$("sample").click();
</script>

</body>
</html>
