<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viz Studio — 読める3Dグラフ</title>
<style>
  :root{--bg:#080a12;--panel:#0f1424ee;--ink:#f2f0fa;--muted:#a6a3bd;--gold:#ffd08a;--line:#2b3352;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;}
  canvas{display:block;position:fixed;inset:0;z-index:0;}
  #labels{position:fixed;inset:0;z-index:4;pointer-events:none;}
  .lbl{position:absolute;top:0;left:0;transform:translate(-50%,-50%);white-space:nowrap;text-shadow:0 1px 6px #000,0 0 2px #000;}
  .lbl.axis{color:var(--gold);font-weight:700;font-size:13px;}
  .lbl.tick{color:#c8c4dc;font-variant-numeric:tabular-nums;font-size:11px;}
  .lbl.cat{color:#d8d4ea;font-size:10.5px;}
  .lbl.val{color:#fff;font-size:10.5px;font-variant-numeric:tabular-nums;font-weight:600;}
  #panel{position:fixed;top:16px;left:16px;z-index:10;width:296px;max-height:calc(100vh - 32px);overflow:auto;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;padding:16px 16px 18px;box-shadow:0 10px 50px #000b;}
  h1{font-size:14px;margin:0;font-weight:700;}.sub{font-size:10.5px;color:var(--muted);margin:3px 0 14px;line-height:1.5;}
  .mood{margin:14px 0;}.mood .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}.mood .lab b{font-weight:600;}
  .mood .ends{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:2px;}
  input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:3px;background:linear-gradient(90deg,#2a3050,#5b4a86);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);border:2px solid #1a1408;cursor:pointer;box-shadow:0 0 10px #ffd08a66;}
  .seg{display:flex;gap:6px;margin:6px 0 4px;}.seg button{flex:1;cursor:pointer;background:#161d34;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px;font-size:12px;}.seg button.on{background:var(--gold);color:#1a1408;border:none;font-weight:700;}
  label.chk{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);margin-top:10px;cursor:pointer;}
  details{margin-top:14px;border-top:1px solid var(--line);padding-top:10px;}details summary{cursor:pointer;font-size:11px;color:var(--muted);}
  textarea{width:100%;box-sizing:border-box;height:84px;margin-top:8px;background:#0b0f1c;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;font-family:ui-monospace,monospace;font-size:11px;}
  .mini{font-size:10px;color:var(--muted);margin:8px 0 3px;}select{width:100%;box-sizing:border-box;background:#0b0f1c;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:5px;font-size:11px;}
  .row{display:flex;gap:8px;}.row>div{flex:1;}.btns{display:flex;gap:8px;margin-top:9px;}.btns button{flex:1;cursor:pointer;border-radius:8px;padding:7px;font-size:12px;border:1px solid var(--line);background:#161d34;color:var(--ink);}.btns button.primary{background:var(--gold);color:#1a1408;border:none;font-weight:700;}
  #err{color:#ff9d8a;font-size:11px;margin-top:6px;}#hint{position:fixed;right:16px;bottom:14px;z-index:5;color:var(--muted);font-size:11px;}
</style>
</head>
<body>

<div id="labels"></div>
<div id="panel">
  <h1>Viz Studio</h1>
  <div class="sub">読める3Dグラフ。壁の方眼と目盛りで値が読めます。気分のつまみで雰囲気を調整。</div>
  <div class="seg" id="mode"><button data-m="bars" class="on">棒</button><button data-m="surface">地形</button></div>
  <label class="chk"><input type="checkbox" id="showval" checked> 棒の先に数値を表示</label>
  <div class="mood"><div class="lab"><b>温度</b></div><input type="range" id="warm" min="0" max="1" step="0.01" value="0.7"><div class="ends"><span>寒色</span><span>暖色</span></div></div>
  <div class="mood"><div class="lab"><b>ドラマ</b></div><input type="range" id="drama" min="0" max="1" step="0.01" value="0.5"><div class="ends"><span>低い</span><span>高く強調</span></div></div>
  <div class="mood"><div class="lab"><b>エネルギー</b></div><input type="range" id="energy" min="0" max="1" step="0.01" value="0.15"><div class="ends"><span>静止</span><span>ゆっくり回る</span></div></div>
  <div class="mood"><div class="lab"><b>空気感</b></div><input type="range" id="air" min="0" max="1" step="0.01" value="0.12"><div class="ends"><span>くっきり</span><span>霧</span></div></div>
  <div class="mood"><div class="lab"><b>発光</b></div><input type="range" id="glow" min="0" max="1" step="0.01" value="0.4"><div class="ends"><span>マット</span><span>ネオン</span></div></div>
  <details id="dbox"><summary>データと列（開いて差し替え）</summary>
    <textarea id="data" spellcheck="false" placeholder="CSV か JSON配列（1行目=見出し）"></textarea>
    <div class="btns"><button id="sample">サンプル</button><button id="apply" class="primary">反映</button></div>
    <div id="err"></div>
    <div class="row"><div><div class="mini">X 列</div><select id="cx"></select></div><div><div class="mini">高さ 列</div><select id="cy"></select></div></div>
    <div class="row"><div><div class="mini">奥行き Z</div><select id="cz"></select></div><div><div class="mini">色 列</div><select id="cc"></select></div></div>
  </details>
</div>
<div id="hint">ドラッグ=回転 / ホイール=拡大</div>
<script src="three.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let ROWS=[],COLS=[],MODE="bars";
const COOL=[[16,22,54],[26,74,150],[40,150,190],[120,205,215],[224,244,255]];
const WARM=[[38,24,66],[120,40,104],[214,72,46],[255,158,61],[255,232,178]];
const mixStop=(a,b,k)=>[a[0]+(b[0]-a[0])*k,a[1]+(b[1]-a[1])*k,a[2]+(b[2]-a[2])*k];
function ramp(warm,t){const P=COOL.map((c,i)=>mixStop(c,WARM[i],warm));t=Math.max(0,Math.min(1,t));const f=t*(P.length-1),i=Math.floor(f),g=f-i;return mixStop(P[i],P[Math.min(i+1,P.length-1)],g);}
function parse(txt){txt=txt.trim();if(!txt)throw"データが空です";if(txt[0]==="["||txt[0]==="{"){let j=JSON.parse(txt);if(!Array.isArray(j))j=[j];if(!j.length)throw"空配列";if(Array.isArray(j[0])){const cols=j[0].map((_,i)=>"c"+i);return{cols,rows:j.map(r=>{const o={};cols.forEach((c,i)=>o[c]=r[i]);return o;})};}return{cols:Object.keys(j[0]),rows:j};}const L=txt.split(/\r?\n/).filter(l=>l.trim());const cols=L[0].split(",").map(s=>s.trim());const rows=L.slice(1).map(l=>{const p=l.split(",");const o={};cols.forEach((c,i)=>o[c]=(p[i]??"").trim());return o;});return{cols,rows};}
const num=v=>{const t=(""+v).trim();return /^-?\d+(?:\.\d+)?$/.test(t)?parseFloat(t):null;};
function fillSelects(){for(const id of["cx","cy","cz","cc"]){const s=$(id);s.innerHTML="";const n=document.createElement("option");n.value="";n.textContent="（なし）";s.appendChild(n);COLS.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;s.appendChild(o);});}const nu=COLS.filter(c=>ROWS.some(r=>num(r[c])!==null));$("cx").value=COLS[0]||"";$("cy").value=nu[0]||COLS[1]||"";$("cz").value=(COLS.find(c=>c!==$("cx").value&&!nu.includes(c)))||nu[1]||"";$("cc").value=nu[0]||COLS[COLS.length-1]||"";}
function extent(col){const vs=ROWS.map(r=>num(r[col])).filter(v=>v!==null);if(!vs.length)return[0,1];return[Math.min(...vs),Math.max(...vs)];}
function cats(col){return[...new Set(ROWS.map(r=>r[col]))];}
function isNum(col){return ROWS.some(r=>num(r[col])!==null);}
function pos1(col,r){if(isNum(col)){const[mn,mx]=extent(col);const v=num(r[col]);return v===null?0.5:(mx===mn?0.5:(v-mn)/(mx-mn));}const cs=cats(col);return cs.length<2?0.5:cs.indexOf(r[col])/(cs.length-1);}
function colorT(col){if(!isNum(col)){const cs=cats(col);return r=>cs.length<2?0.6:cs.indexOf(r[col])/(cs.length-1);}const[mn,mx]=extent(col);return r=>{const v=num(r[col]);return v===null?0.5:(mx===mn?0.5:(v-mn)/(mx-mn));};}

const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();let BG=0x080a12;renderer.setClearColor(BG,1);scene.fog=new THREE.Fog(BG,520,900);
const camera=new THREE.PerspectiveCamera(44,innerWidth/innerHeight,0.1,4000);
const group=new THREE.Group();scene.add(group);
scene.add(new THREE.AmbientLight(0xa6b2dc,0.9));const pl=new THREE.DirectionalLight(0xffffff,0.9);pl.position.set(120,260,160);scene.add(pl);const pl2=new THREE.DirectionalLight(0x8fa0ff,0.4);pl2.position.set(-140,120,-120);scene.add(pl2);
function dot(){const c=document.createElement('canvas');c.width=c.height=64;const g=c.getContext('2d');const r=g.createRadialGradient(32,32,0,32,32,32);r.addColorStop(0,'rgba(255,255,255,1)');r.addColorStop(.35,'rgba(255,246,224,.8)');r.addColorStop(1,'rgba(255,226,182,0)');g.fillStyle=r;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const DOT=dot();
const SPAN=200,X0=-SPAN/2,Z0=-SPAN/2,X1=SPAN/2,Z1=SPAN/2;
let built=null,ptMat=null,LABELS=[],curH=150,SURF=null;
function clr(){if(built){group.remove(built);built.traverse(o=>{o.geometry&&o.geometry.dispose();o.material&&(Array.isArray(o.material)?o.material.forEach(m=>m.dispose()):o.material.dispose());});}built=null;ptMat=null;LABELS=[];SURF=null;}
const M=()=>({warm:+$("warm").value,drama:+$("drama").value,energy:+$("energy").value,air:+$("air").value,glow:+$("glow").value});
function fmt(v){if(Math.abs(v)>=10000)return Math.round(v).toLocaleString();return (Math.round(v*100)/100).toString();}
function walls(H,ny,cx,cz){const root=new THREE.Group();
  const gm=new THREE.LineBasicMaterial({color:0x33406a,transparent:true,opacity:.85});
  const gm2=new THREE.LineBasicMaterial({color:0x232c4a,transparent:true,opacity:.7});
  function L(a,b,m){root.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),m));}
  // horizontal gridlines on back wall (z=Z0) and left wall (x=X0) at 5 levels
  for(let i=0;i<=5;i++){const y=H*i/5;L(new THREE.Vector3(X0,y,Z0),new THREE.Vector3(X1,y,Z0),gm2);L(new THREE.Vector3(X0,y,Z0),new THREE.Vector3(X0,y,Z1),gm2);
    if(i%1===0){LABELS.push({t:fmt(ny.mn+(ny.mx-ny.mn)*(i/5)),p:new THREE.Vector3(X0-12,y,Z0),c:"tick"});}}
  // vertical edges (box)
  const eg=[[X0,0,Z0,X1,0,Z0],[X0,0,Z0,X0,0,Z1],[X1,0,Z0,X1,0,Z1],[X0,0,Z1,X1,0,Z1],[X0,0,Z0,X0,H,Z0],[X1,0,Z0,X1,H,Z0],[X0,H,Z0,X1,H,Z0],[X0,0,Z1,X0,H,Z1]];
  eg.forEach(c=>L(new THREE.Vector3(c[0],c[1],c[2]),new THREE.Vector3(c[3],c[4],c[5]),gm));
  LABELS.push({t:cx||"X",p:new THREE.Vector3(0,-10,Z1),c:"axis"});if(cz)LABELS.push({t:cz,p:new THREE.Vector3(X1+8,-10,0),c:"axis"});
  return root;}

function build(){clr();if(!ROWS.length)return;const m=M();
  const cx=$("cx").value,cy=$("cy").value,cz=$("cz").value,cc=$("cc").value;
  const ny=(()=>{const[mn,mx]=extent(cy);return{mn,mx};})();const ct=colorT(cc);
  const H=90+m.drama*150;curH=H;const showVal=$("showval").checked;
  const root=new THREE.Group();root.add(walls(H,ny,cx,cz));
  const xN=isNum(cx)?null:cats(cx), zN=cz?(isNum(cz)?null:cats(cz)):null;
  function xpos(r){return (pos1(cx,r)-0.5)*SPAN*0.86;}
  function zpos(r){return cz?(pos1(cz,r)-0.5)*SPAN*0.86:0;}
  if(MODE==="bars"){
    const nbx=xN?xN.length:ROWS.length, nbz=zN?zN.length:1;
    const bw=Math.max(6, SPAN*0.84/nbx*0.62);
    const bd=cz?Math.max(6, SPAN*0.84/nbz*0.62):bw;
    const seenX={};
    ROWS.forEach(r=>{const x=xpos(r),z=zpos(r);const[mn,mx]=extent(cy);const v=num(r[cy]);const hv=v===null?0:(mx===mn?0.5:(v-mn)/(mx-mn));const h=Math.max(1.5,hv*H);
      const c=ramp(m.warm,ct(r));const col=new THREE.Color(c[0]/255,c[1]/255,c[2]/255);
      const box=new THREE.BoxGeometry(bw,h,bd);box.translate(x,h/2,z);
      const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.12+m.glow*0.9,roughness:0.35,metalness:0.15});
      root.add(new THREE.Mesh(box,mat));
      if(xN&&!seenX[r[cx]]){seenX[r[cx]]=1;LABELS.push({t:r[cx],p:new THREE.Vector3(x,-9,Z1),c:"cat"});}
      if(showVal&&v!==null&&ROWS.length<=42)LABELS.push({t:fmt(v),p:new THREE.Vector3(x,h+8,z),c:"val"});});
  }else{
    const A=ROWS.map(r=>({u:pos1(cx,r),v:cz?pos1(cz,r):0.5,h:(()=>{const[mn,mx]=extent(cy);const v=num(r[cy]);return v===null?0:(mx===mn?0.5:(v-mn)/(mx-mn));})()}));
    const G=64;const pos=new Float32Array(G*G*3),col=new Float32Array(G*G*3),phase=new Float32Array(G*G);let k=0;
    for(let i=0;i<G;i++)for(let j=0;j<G;j++){const u=i/(G-1),v=j/(G-1);let sw=0,sh=0;for(const a of A){const d=(u-a.u)**2+(v-a.v)**2+0.0009;const w=1/(d*d);sw+=w;sh+=w*a.h;}const hv=sh/sw;const x=(u-0.5)*SPAN,z=(v-0.5)*SPAN,y=hv*H;pos[k*3]=x;pos[k*3+1]=y;pos[k*3+2]=z;phase[k]=(u+v)*7;const c=ramp(m.warm,hv);col[k*3]=c[0]/255;col[k*3+1]=c[1]/255;col[k*3+2]=c[2]/255;k++;}
    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));
    ptMat=new THREE.PointsMaterial({size:2.4,map:DOT,vertexColors:true,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true,opacity:0.95});
    root.add(new THREE.Points(g,ptMat));SURF={attr:g.getAttribute('position'),baseY:Float32Array.from(pos.filter((_,i)=>i%3===1)),phase,n:G*G};
  }
  built=root;group.add(root);buildLabelDom();applyAir(m);
}
function applyAir(m){scene.fog.near=560-m.air*380;scene.fog.far=920-m.air*300;const bg=[Math.round(8+8*m.air),Math.round(10+6*m.air),Math.round(18+12*m.air)];BG=(bg[0]<<16)|(bg[1]<<8)|bg[2];renderer.setClearColor(BG,1);scene.fog.color.setHex(BG);}
let labEls=[];function buildLabelDom(){const b=$("labels");b.innerHTML="";labEls=LABELS.map(L=>{const d=document.createElement("div");d.className="lbl "+(L.c||"");d.textContent=L.t;b.appendChild(d);return d;});}
let az=0.66,pol=1.16,rad=270,drag=false,px=0,py=0,last=0;
function place(){camera.position.set(rad*Math.sin(pol)*Math.sin(az),curH*0.55+rad*Math.cos(pol),rad*Math.sin(pol)*Math.cos(az));camera.lookAt(0,curH*0.42,0);}
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;last=performance.now();el.setPointerCapture(e.pointerId);});
el.addEventListener('pointerup',()=>drag=false);
el.addEventListener('pointermove',e=>{if(!drag)return;az-=(e.clientX-px)*0.005;pol=Math.max(0.12,Math.min(1.5,pol-(e.clientY-py)*0.004));px=e.clientX;py=e.clientY;last=performance.now();});
el.addEventListener('wheel',e=>{e.preventDefault();rad=Math.max(110,Math.min(950,rad+e.deltaY*0.5));last=performance.now();},{passive:false});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;const v3=new THREE.Vector3();
function tick(t){requestAnimationFrame(tick);const en=+$("energy").value;
  if(!drag&&performance.now()-last>2500&&!reduce)az+=en*0.004;
  if(SURF&&en>0.001&&!reduce){const a=SURF.attr,amp=curH*0.04*en;for(let i=0;i<SURF.n;i++)a.array[i*3+1]=SURF.baseY[i]+Math.sin(t*0.0016+SURF.phase[i])*amp;a.needsUpdate=true;}
  place();
  for(let i=0;i<LABELS.length;i++){v3.copy(LABELS[i].p).project(camera);const e2=labEls[i];if(!e2)continue;if(v3.z<1){e2.style.display="block";e2.style.transform=`translate(-50%,-50%) translate(${(v3.x*.5+.5)*innerWidth}px,${(-v3.y*.5+.5)*innerHeight}px)`;}else e2.style.display="none";}
  renderer.render(scene,camera);}
requestAnimationFrame(tick);
function applyData(){try{$("err").textContent="";const {cols,rows}=parse($("data").value);COLS=cols;ROWS=rows;fillSelects();build();}catch(e){$("err").textContent="読み込めません："+e;}}
$("apply").onclick=applyData;
$("sample").onclick=()=>{const R=["month,sales,region"];const base=[120,140,135,160,190,175,210,230,205,250,280,300];base.forEach((v,i)=>{["東","西","南"].forEach((rg,g)=>R.push(`${i+1}月,${Math.round(v*(0.72+g*0.2))},${rg}`));});$("data").value=R.join("\n");applyData();};
["cx","cy","cz","cc"].forEach(id=>$(id).onchange=build);["warm","drama","glow"].forEach(id=>$(id).oninput=build);$("air").oninput=()=>applyAir(M());$("showval").onchange=build;
document.querySelectorAll("#mode button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#mode button").forEach(x=>x.classList.remove("on"));b.classList.add("on");MODE=b.dataset.m;build();});
$("sample").click();
</script>

</body>
</html>
